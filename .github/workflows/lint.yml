name: Linting & Type Checking

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry ruff black mypy
        poetry install
    
    - name: Format check with black
      run: black --check agents/ memory/ reasoning/ infrastructure/ evaluation/
    
    - name: Lint with ruff
      run: ruff check agents/ memory/ reasoning/ infrastructure/ evaluation/
    
    - name: Type check with mypy
      run: mypy agents/ memory/ reasoning/ --strict 2>/dev/null || true
