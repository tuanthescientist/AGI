# AGI System Configuration

# Model Configuration
MODEL:
  type: "meta-transformer"
  hidden_dim: 512
  num_heads: 8
  num_layers: 12
  memory_capacity: 1.0e9
  enable_self_awareness: true

# Training Configuration
TRAINING:
  epochs: 100
  batch_size: 32
  learning_rate: 0.0001
  learning_rate_schedule: "cosine"
  optimizer: "adam"
  enable_curriculum_learning: true
  enable_multi_task_learning: true
  enable_self_improvement: true

# Data Configuration
DATA:
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  data_augmentation: true
  augmentation_factor: 2
  normalize: true
  remove_outliers: true

# Distributed Training
DISTRIBUTED:
  num_workers: 4
  backend: "nccl"
  sync_gradient: true
  gradient_checkpointing: true

# Evaluation
EVALUATION:
  evaluate_every_n_epochs: 5
  save_checkpoint_every_n_epochs: 10
  compute_benchmarks: true
  measure_self_awareness: true
  continuous_monitoring: true

# Infrastructure
INFRASTRUCTURE:
  resource_auto_scaling: true
  max_gpu_memory_percent: 0.9
  enable_profiling: true
  log_level: "INFO"

# Self-Improvement
SELF_IMPROVEMENT:
  enable: true
  check_interval_epochs: 10
  improvement_threshold: 0.05
  max_improvements_per_round: 3

# Output
OUTPUT:
  checkpoint_dir: "./checkpoints"
  log_dir: "./logs"
  results_dir: "./results"
  save_config: true
  save_metrics: true
